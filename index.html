<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-Connie — AI 产品商店</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8;
    --bg-card: #FFFDF8;
    --ink: #2E2A24;
    --ink-soft: #6B6359;
    --ink-faint: #A39E95;
    --ink-ghost: #CBC6BD;
    --rule: #DDD7CD;
    --rule-light: #EBE7E0;
    --accent: #7B8F6B;
    --accent-soft: #7B8F6B22;
    --xhs: #D14D3D;
    --xhs-soft: #D14D3D10;
    --radius: 6px;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  body {
    font-family: "Outfit", -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    /* clean warm background, no external assets */
  }

  .page {
    max-width: 520px;
    margin: 0 auto;
    padding: 0 24px 48px;
  }

  /* ================================================================
     TOP ROW — Profile
     ================================================================ */
  .profile {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    padding: 32px 0 22px;
  }

  .profile-left {
    display: flex;
    align-items: center;
    gap: 11px;
    flex-shrink: 0;
  }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    overflow: hidden;
    outline: 1.5px solid var(--rule);
    outline-offset: 2px;
    flex-shrink: 0;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .profile-name {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 7px;
    line-height: 1;
    margin-bottom: 5px;
  }
  .badge-xhs {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 9px;
    font-weight: 600;
    color: var(--xhs);
    background: var(--xhs-soft);
    padding: 2px 6px 2px 5px;
    border-radius: 3px;
    letter-spacing: 0.02em;
    line-height: 1;
    text-decoration: none;
    transition: background .15s;
  }
  .badge-xhs:hover { background: #D14D3D20; }
  .badge-xhs::before {
    content: "";
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--xhs);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .profile-id {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ink-ghost);
    letter-spacing: 0.03em;
  }

  .profile-right {
    text-align: right;
    padding-top: 2px;
  }
  .profile-bio {
    font-size: 11.5px;
    line-height: 1.6;
    color: var(--ink-faint);
    max-width: 200px;
    text-wrap: balance;
  }
  .capy-btn {
    display: inline-block;
    margin-top: 8px;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid #7B8F6B30;
    padding: 4px 10px;
    border-radius: 4px;
    text-decoration: none;
    letter-spacing: .01em;
    transition: background .15s, border-color .15s;
  }
  .capy-btn:hover { background: #7B8F6B18; border-color: var(--accent); }

  /* ================================================================
     STATS ROW
     ================================================================ */
  .stats {
    display: flex;
    background: var(--bg-card);
    border: 1px solid var(--rule-light);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .stat {
    flex: 1;
    text-align: center;
    padding: 18px 8px 16px;
    position: relative;
  }
  .stat + .stat::before {
    content: "";
    position: absolute;
    left: 0;
    top: 16px;
    bottom: 16px;
    width: 1px;
    background: var(--rule-light);
  }

  .stat-num {
    font-family: "Instrument Serif", Georgia, serif;
    font-size: 30px;
    font-weight: 400;
    line-height: 1;
    color: var(--ink);
    margin-bottom: 5px;
    letter-spacing: -0.02em;
  }
  .stat-num.highlight { color: var(--accent); }

  .stat-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-ghost);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ================================================================
     PRODUCTS SECTION
     ================================================================ */
  .products-section {
    margin-top: 28px;
  }

  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
    padding: 0 2px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .section-title::before {
    content: "—  ";
    color: var(--ink-ghost);
  }

  .section-aside {
    font-size: 10px;
    color: var(--ink-ghost);
    font-style: italic;
    font-family: "Instrument Serif", Georgia, serif;
    letter-spacing: 0.02em;
  }

  /* Category tabs */
  .cat-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-ghost);
    background: none;
    border: 1px solid var(--rule-light);
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
    font-family: inherit;
  }
  .cat-tab:hover { border-color: var(--rule); color: var(--ink-faint); }
  .cat-tab.active {
    background: var(--ink);
    color: var(--bg-card);
    border-color: var(--ink);
  }

  /* Product grid — 1:1 square cards */
  .product-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .product-card {
    background: var(--bg-card);
    border: 1px solid var(--rule-light);
    border-radius: var(--radius);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, transform 0.15s;
    display: flex;
    flex-direction: column;
    aspect-ratio: 1;
    position: relative;
  }
  .product-card:hover {
    border-color: var(--rule);
    transform: translateY(-2px);
  }

  .product-card .card-icon {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    line-height: 1;
    background: linear-gradient(145deg, var(--rule-light) 0%, #EDE8E0 100%);
  }
  .product-card .card-icon img { width: 100%; height: 100%; object-fit: cover; }

  .product-card .card-body {
    padding: 10px 12px 11px;
    border-top: 1px solid var(--rule-light);
  }
  .product-card .card-body h3 {
    font-size: 12.5px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 3px;
    letter-spacing: -0.01em;
  }
  .product-card .card-body p {
    font-size: 10px;
    color: var(--ink-faint);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .product-card .card-tag {
    position: absolute;
    top: 8px;
    right: 8px;
    font-family: "JetBrains Mono", monospace;
    font-size: 8px;
    font-weight: 500;
    color: var(--accent);
    background: var(--bg-card);
    border: 1px solid var(--accent-soft);
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .product-card .card-cat {
    position: absolute;
    top: 8px;
    left: 8px;
    font-size: 8px;
    font-weight: 600;
    color: var(--ink-faint);
    background: var(--bg-card);
    border: 1px solid var(--rule-light);
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.02em;
  }

  /* Empty state */
  .empty-state {
    padding: 40px 20px 32px;
    text-align: center;
  }
  .empty-mark {
    font-family: "Instrument Serif", serif;
    font-style: italic;
    font-size: 32px;
    color: var(--rule);
    line-height: 1;
    margin-bottom: 14px;
    user-select: none;
  }
  .empty-text {
    font-size: 13px;
    color: var(--ink-ghost);
    line-height: 1.85;
  }

  /* ================================================================
     FOOTER
     ================================================================ */
  .foot {
    margin-top: 32px;
    padding-top: 18px;
    border-top: 1px solid var(--rule-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .foot-xhs {
    font-size: 11px;
    color: var(--ink-faint);
    text-decoration: none;
    transition: color .15s;
  }
  .foot-xhs:hover { color: var(--ink-soft); }
  .foot-xhs strong {
    color: var(--xhs);
    font-weight: 600;
  }

  .foot-link {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink);
    text-decoration: none;
    padding: 6px 14px;
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    background: var(--bg-card);
    transition: border-color 0.15s;
    letter-spacing: 0.01em;
  }
  .foot-link:hover { border-color: var(--ink-soft); }

  .foot-fine {
    margin-top: 18px;
    text-align: center;
    font-size: 9.5px;
    color: var(--ink-ghost);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ================================================================
     RESPONSIVE
     ================================================================ */
  @media (max-width: 440px) {
    .page { padding: 0 18px 40px; }
    .profile { flex-direction: column; gap: 10px; padding: 24px 0 18px; }
    .profile-right { text-align: left; }
    .profile-bio { max-width: none; }
    .stat-num { font-size: 26px; }
    .stat { padding: 14px 6px 12px; }
  }
</style>
</head>

<script>
// Day counter
const START = '2026-03-10';
const elapsed = Math.max(1, Math.floor((new Date() - new Date(START)) / 86400000) + 1);
document.getElementById('dayCount').textContent = elapsed;

// Product data — add entries to ship products
// { name, desc, icon (emoji), img (optional), cat (category), url }
const products = [
  { name: "AI 甩锅大师", desc: "输入你犯的错，AI 帮你编三种风格的完美借口", img: "products/blame-shifter-preview.png", cat: "搞笑", url: "products/blame-shifter.html" },
  { name: "AI 前任分析报告", desc: "选择前任特征，生成专业「渣值鉴定报告」", img: "products/ex-analysis-preview.png", cat: "情感", url: "products/ex-analysis.html" },
];

// Render
const grid = document.getElementById('productGrid');
const empty = document.getElementById('emptyState');
const counter = document.getElementById('productCount');
const tabsEl = document.getElementById('catTabs');
let activeCat = '全部';

function getCats() {
  const cats = ['全部'];
  products.forEach(p => { if (p.cat && !cats.includes(p.cat)) cats.push(p.cat); });
  return cats;
}

function renderTabs() {
  const cats = getCats();
  if (cats.length <= 2) { tabsEl.style.display = 'none'; return; }
  tabsEl.innerHTML = cats.map(c =>
    `<button class="cat-tab${c === activeCat ? ' active' : ''}" data-cat="${c}">${c}</button>`
  ).join('');
  tabsEl.querySelectorAll('.cat-tab').forEach(btn => {
    btn.onclick = () => { activeCat = btn.dataset.cat; renderTabs(); renderGrid(); };
  });
}

function renderGrid() {
  const filtered = activeCat === '全部' ? products : products.filter(p => p.cat === activeCat);
  counter.textContent = products.length;
  if (!products.length) { grid.style.display = 'none'; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.style.display = 'grid';
  grid.innerHTML = filtered.map(p => `
    <a class="product-card" href="${p.url || '#'}" target="_blank" rel="noopener">
      <div class="card-icon">
        ${p.img ? `<img src="${p.img}" alt="${p.name}">` : p.icon || ''}
      </div>
      <div class="card-body">
        <h3>${p.name}</h3>
        <p>${p.desc || ''}</p>
      </div>
      <span class="card-tag">Free</span>
      ${p.cat ? `<span class="card-cat">${p.cat}</span>` : ''}
    </a>
  `).join('');
}

renderTabs();
renderGrid();
</script>
