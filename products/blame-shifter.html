<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>甩锅大师 — 一本正经地胡说八道</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#F5F0E8;--bg-card:#FFFDF8;--ink:#2E2A24;--ink-soft:#6B6359;
            --ink-faint:#A39E95;--ink-ghost:#CBC6BD;--rule:#DDD7CD;--rule-light:#EBE7E0;
            --accent:#7B8F6B;--accent-soft:rgba(123,143,107,.12);--accent-deep:#6A7D5C;
            --danger:#C0694A;--r:12px;--rl:18px;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{-webkit-font-smoothing:antialiased}
        body{
            font-family:'Outfit',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
            background:var(--bg);color:var(--ink);
            min-height:100vh;min-height:100dvh;
            display:flex;flex-direction:column;align-items:center;padding:20px;
        }
        .page{width:100%;max-width:480px;margin:0 auto}

        header{text-align:center;padding:28px 0 4px}
        h1{font-family:'Instrument Serif',Georgia,serif;font-size:2.2rem;font-weight:400;line-height:1.15;margin-bottom:6px}
        .sub{font-size:.88rem;color:var(--accent);font-weight:400;letter-spacing:.3px}
        .ai-dot{
            display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:3px 10px;
            background:var(--accent-soft);border:1px solid rgba(123,143,107,.18);
            border-radius:20px;font-size:9px;font-weight:600;color:var(--accent);
            letter-spacing:.6px;text-transform:uppercase;
        }
        .ai-dot::before{content:"";width:5px;height:5px;background:var(--accent);border-radius:50%;animation:blink 2s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

        .input-card{
            background:var(--bg-card);border:1.5px solid var(--rule-light);
            border-radius:var(--rl);padding:24px 22px;margin:24px 0 0;
            box-shadow:0 2px 10px rgba(46,42,36,.04);transition:border-color .2s;
        }
        .input-card:focus-within{border-color:var(--accent)}
        .input-card label{font-size:.95rem;font-weight:600;display:block;margin-bottom:12px}
        .input-card label span{font-size:.78rem;color:var(--ink-ghost);font-weight:400;margin-left:6px}

        .text-wrap{position:relative}
        textarea{
            width:100%;min-height:68px;padding:12px 14px;font-size:.93rem;font-family:inherit;
            line-height:1.6;border:1.5px solid var(--rule-light);border-radius:var(--r);
            background:var(--bg);color:var(--ink);resize:none;outline:none;
            transition:border-color .2s,background .2s;
        }
        textarea:focus{border-color:var(--accent);background:var(--bg-card)}
        textarea::placeholder{color:var(--ink-ghost);font-weight:300}
        .cc{position:absolute;bottom:6px;right:10px;font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--ink-ghost)}

        .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
        .tag{
            font-size:10.5px;font-weight:500;color:var(--ink-faint);background:var(--bg);
            border:1px solid var(--rule-light);padding:3px 9px;border-radius:20px;
            cursor:pointer;font-family:inherit;transition:all .15s;
        }
        .tag:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

        .btn-go{
            width:100%;padding:15px;margin-top:14px;font-size:1rem;font-weight:600;
            font-family:inherit;background:var(--accent);color:var(--bg-card);
            border:none;border-radius:var(--r);cursor:pointer;transition:all .25s;
            letter-spacing:.02em;box-shadow:0 4px 14px rgba(123,143,107,.2);
        }
        .btn-go:hover:not(:disabled){background:var(--accent-deep);transform:translateY(-2px);box-shadow:0 6px 18px rgba(123,143,107,.3)}
        .btn-go:active:not(:disabled){transform:translateY(0)}
        .btn-go:disabled{opacity:.65;cursor:not-allowed}

        .ld{display:none;text-align:center;padding:44px 20px}
        .ld.on{display:block}
        .ring{width:40px;height:40px;margin:0 auto 16px;border:3px solid var(--rule-light);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .ld-txt{font-size:.92rem;color:var(--accent);font-weight:500}
        .ld-sub{font-size:.78rem;color:var(--ink-ghost);margin-top:4px}

        .err{display:none;background:#FDF5F2;border:1.5px solid #E8D4CC;border-radius:var(--rl);padding:22px;text-align:center;margin-top:20px}
        .err.on{display:block}
        .err h4{font-size:.95rem;color:var(--danger);margin-bottom:4px}
        .err p{font-size:.82rem;color:#8B6B5A;line-height:1.5}
        .err button{
            margin-top:12px;padding:7px 18px;font-size:.82rem;font-weight:600;
            font-family:inherit;background:none;color:var(--danger);
            border:1.5px solid var(--danger);border-radius:8px;cursor:pointer;transition:all .15s;
        }
        .err button:hover{background:var(--danger);color:#fff}

        .result{display:none;margin-top:24px}
        .result.on{display:block}

        .excuse-box{
            background:var(--bg-card);border:1.5px solid var(--rule-light);
            border-radius:var(--rl);padding:28px 24px 24px;
            box-shadow:0 2px 12px rgba(46,42,36,.04);animation:pop .35s ease both;
        }
        @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}

        .excuse-txt{font-size:1.25rem;line-height:1.7;color:var(--ink);margin-bottom:20px;font-weight:500;text-align:center;padding:8px 0}

        .cred{display:flex;align-items:center;gap:10px}
        .cred-lbl{font-size:.76rem;color:var(--accent);font-weight:600;white-space:nowrap;min-width:50px}
        .cred-bar{flex:1;height:5px;background:var(--rule-light);border-radius:3px;overflow:hidden}
        .cred-fill{height:100%;background:linear-gradient(90deg,var(--accent),#A4B894);border-radius:3px;width:0;transition:width .9s cubic-bezier(.4,0,.2,1)}
        .cred-num{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;color:var(--ink-faint);min-width:28px;text-align:right}

        .acts{display:flex;gap:10px;margin-top:18px}
        .btn-swap,.btn-reset{
            flex:1;padding:12px;font-size:.9rem;font-weight:600;
            font-family:inherit;border-radius:var(--r);cursor:pointer;transition:all .2s;
        }
        .btn-swap{background:var(--accent);color:var(--bg-card);border:none;box-shadow:0 3px 10px rgba(123,143,107,.18)}
        .btn-swap:hover:not(:disabled){background:var(--accent-deep);transform:translateY(-1px)}
        .btn-swap:disabled{opacity:.6;cursor:not-allowed}
        .btn-reset{background:var(--bg-card);color:var(--accent);border:1.5px solid var(--accent)}
        .btn-reset:hover{background:var(--accent);color:var(--bg-card)}

        footer{text-align:center;margin-top:44px;padding:16px}
        footer a{color:var(--accent);text-decoration:none;font-weight:600;font-size:.82rem}
        footer a:hover{text-decoration:underline}
        .wm{margin-top:6px;font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--ink-ghost)}

        @media(max-width:480px){h1{font-size:1.9rem}.input-card{padding:20px 18px}.excuse-box{padding:22px 18px}}
    </style>
</head>
<body>
<div class="page">
    <header>
        <h1>甩锅大师</h1>
        <p class="sub">一本正经地胡说八道</p>
        <div class="ai-dot">AI Powered</div>
    </header>

    <div class="input-card">
        <label>你做了什么好事？<span>说清楚，锅才甩得准</span></label>
        <div class="text-wrap">
            <textarea id="inp" placeholder="比如：上班迟到了 / 忘记女朋友生日 / 把客户文件删了..." maxlength="200" rows="2"></textarea>
            <span class="cc"><span id="cn">0</span>/200</span>
        </div>
        <div class="tags">
            <button class="tag" onclick="fill('上班迟到了')">上班迟到</button>
            <button class="tag" onclick="fill('忘记女朋友生日')">忘记生日</button>
            <button class="tag" onclick="fill('项目没做完')">项目delay</button>
            <button class="tag" onclick="fill('打游戏被老婆抓到了')">偷玩游戏</button>
            <button class="tag" onclick="fill('考试挂科了')">考试挂科</button>
        </div>
        <button class="btn-go" id="btnGo" onclick="go()">开始甩锅</button>
    </div>

    <div class="ld" id="ld">
        <div class="ring"></div>
        <div class="ld-txt" id="ldTxt">正在颠倒黑白...</div>
        <div class="ld-sub">AI 正在编造完美借口</div>
    </div>

    <div class="err" id="err">
        <h4>翻车了</h4>
        <p id="errMsg">AI 也甩不动了</p>
        <button onclick="go()">再试一次</button>
    </div>

    <div class="result" id="res">
        <div class="excuse-box" id="box">
            <div class="excuse-txt" id="txt"></div>
            <div class="cred">
                <span class="cred-lbl">可信度</span>
                <div class="cred-bar"><div class="cred-fill" id="bar"></div></div>
                <span class="cred-num" id="num"></span>
            </div>
        </div>
        <div class="acts">
            <button class="btn-swap" id="btnSwap" onclick="go()">换一个</button>
            <button class="btn-reset" onclick="reset()">换个锅甩</button>
        </div>
    </div>

    <footer>
        <p><a href="https://happycapy.ai/?via=connie" target="_blank">AI-Connie 出品</a></p>
        <p class="wm">shujilai.github.io/connieai-store</p>
    </footer>
</div>

<script>
const API_URL = 'https://ai-gateway.happycapy.ai/api/v1/openai/v1/chat/completions';
const API_KEY = '005cbe34ac934822854f1420b86fb83b';

const SYSTEM_PROMPT = `你是"甩锅大师"，专出神评级别的一句话借口。

风格：弱智吧神评/微博神回复——一句话，短、狠、离谱，但逻辑上好像说得通。
参考例子（仅供理解风格，不要照抄）：
- "上班迟到" → "早到的人负责开灯关灯，我这是在合理规避额外劳动"
- "忘记纪念日" → "记性好的人容易活在过去，我是为了活在当下才忘的"
- "项目没做完" → "做完了就没有下期预算了，我这叫战略性留白"

核心要求：
- 必须紧扣用户说的事，不能答非所问
- 只出一句话，不超过40个字，一句即神评
- 中文，语气理直气壮，像在陈述常识
- 核心技巧：偷换概念、倒果为因、强行合理化
- 附带可信度评分（1-100，多数15-35，偶尔85+）

严格按以下JSON格式回复，不要输出任何其他内容：
{
  "text": "一句话借口...",
  "credibility": 22
}`;

const inp = document.getElementById('inp');
const cn = document.getElementById('cn');
let cur = '';

const ldWords = [
    '正在颠倒黑白...','正在扭曲因果关系...','正在寻找替罪羊...',
    '正在篡改宇宙记忆...','正在翻阅杠精手册...','正在编造不在场证明...',
    '正在计算甩锅最优解...','正在召唤平行宇宙的自己...',
    '正在查阅弱智吧精华帖...','正在联系甲方的甲方...'
];

inp.addEventListener('input', () => cn.textContent = inp.value.length);
inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); } });

function fill(t) { inp.value = t; cn.textContent = t.length; inp.focus(); }

function show(id) {
    ['ld','err','res'].forEach(s => document.getElementById(s).classList.remove('on'));
    if (id) document.getElementById(id).classList.add('on');
}

let ldTimer = null;
function ldStart() {
    show('ld');
    let i = 0;
    ldTimer = setInterval(() => { i = (i + 1) % ldWords.length; document.getElementById('ldTxt').textContent = ldWords[i]; }, 750);
}
function ldStop() { if (ldTimer) { clearInterval(ldTimer); ldTimer = null; } }

async function go() {
    const v = inp.value.trim();
    if (!v) { inp.focus(); inp.style.borderColor='var(--danger)'; setTimeout(()=>inp.style.borderColor='',1200); return; }
    cur = v;
    document.getElementById('btnGo').disabled = true;
    const swapBtn = document.getElementById('btnSwap');
    if (swapBtn) swapBtn.disabled = true;
    ldStart();

    try {
        const r = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + API_KEY },
            body: JSON.stringify({
                model: 'gpt-4o-mini',
                messages: [
                    { role: 'system', content: SYSTEM_PROMPT },
                    { role: 'user', content: v }
                ],
                max_tokens: 200,
                temperature: 1.0
            })
        });
        const raw = await r.json();
        ldStop();
        if (!r.ok) throw new Error(raw.error?.message || '服务器开小差了');
        const content = raw.choices?.[0]?.message?.content;
        if (!content) throw new Error('AI 没有返回内容');
        const m = content.match(/\{[\s\S]*\}/);
        if (!m) throw new Error('AI 返回格式不正确');
        render(JSON.parse(m[0]));
    } catch (e) {
        ldStop();
        document.getElementById('errMsg').textContent = e.message;
        show('err');
    } finally {
        document.getElementById('btnGo').disabled = false;
        const swapBtn = document.getElementById('btnSwap');
        if (swapBtn) swapBtn.disabled = false;
    }
}

function render(d) {
    document.getElementById('txt').textContent = d.text;
    document.getElementById('num').textContent = d.credibility + '%';
    const box = document.getElementById('box');
    box.style.animation = 'none'; box.offsetHeight; box.style.animation = '';
    show('res');
    const bar = document.getElementById('bar');
    bar.style.width = '0';
    requestAnimationFrame(() => requestAnimationFrame(() => bar.style.width = d.credibility + '%'));
}

function reset() { inp.value = ''; cn.textContent = '0'; cur = ''; show(null); inp.focus(); }
</script>
</body>
</html>
