// ===== GAME STATE =====
let gender = '';
let currentCat = null;
let currentImg = '';
let tiles = [];
let totalTiles = 0;
let revealed = 0;
let score = 0;
let streak = 0;
let qNum = 0;
let gameQuestions = [];
let currentQ = null;
let startTime = 0;
let imgCounters = { easy:0, medium:0, hard:0 };

// ===== SCREENS =====
const screens = ['ageGate','genderSelect','catSelect','gameArea','winScreen'];
function showScreen(id) {
    screens.forEach(s => document.getElementById(s).style.display = 'none');
    document.getElementById(id).style.display = id === 'ageGate' ? 'flex' : 'block';
}

function passAge() { showScreen('genderSelect'); }

function pickGender(g) {
    gender = g;
    imgCounters = { easy:0, medium:0, hard:0 };
    showScreen('catSelect');
    buildCatGrid();
}

function backToGender() { showScreen('genderSelect'); }

function buildCatGrid() {
    const grid = document.getElementById('catGrid');
    grid.innerHTML = '';
    const spicyColors = { easy:'', medium:'', hard:'spicy' };
    CATEGORIES.forEach(cat => {
        const card = document.createElement('div');
        card.className = 'cat-card';
        card.onclick = () => startGame(cat);
        card.innerHTML = `
            <div class="c-icon">${cat.icon}</div>
            <div class="c-info">
                <div class="c-name">${cat.name}</div>
                <div class="c-desc">${cat.desc}</div>
                <div class="c-meta">
                    <span class="c-tag">${cat.grid}x${cat.grid} = ${cat.grid*cat.grid}题</span>
                    <span class="c-tag ${cat.tier === 'hard' ? 'spicy' : ''}">${cat.spicy}</span>
                </div>
            </div>
            ${cat.hot ? '<div class="c-hot">HOT</div>' : ''}
        `;
        grid.appendChild(card);
    });
}

function backToCats() {
    showScreen('catSelect');
    buildCatGrid();
}

// ===== GAME =====
function startGame(cat) {
    currentCat = cat;
    totalTiles = cat.grid * cat.grid;
    revealed = 0; score = 0; streak = 0; qNum = 0;
    startTime = Date.now();

    // Pick image from correct tier
    const tierImgs = IMAGES[gender][cat.tier];
    currentImg = tierImgs[imgCounters[cat.tier] % tierImgs.length];
    imgCounters[cat.tier]++;

    // Shuffle questions
    const pool = [...Q[cat.id]];
    for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    gameQuestions = pool.slice(0, totalTiles + 15);

    showScreen('gameArea');
    document.getElementById('gameTitle').textContent = cat.name;
    document.getElementById('scoreNum').textContent = '0';
    document.getElementById('streakText').textContent = '';
    document.getElementById('progFill').style.width = '0%';

    // Set image
    document.getElementById('imgLayer').innerHTML = `<img src="${currentImg}" alt="" loading="eager">`;

    // Build tile grid
    const tg = document.getElementById('tileGrid');
    tg.style.gridTemplateColumns = `repeat(${cat.grid}, 1fr)`;
    tg.innerHTML = '';
    tiles = [];
    for (let i = 0; i < totalTiles; i++) {
        const t = document.createElement('div');
        t.className = 'tile';
        t.textContent = '?';
        tg.appendChild(t);
        tiles.push(t);
    }
    nextQuestion();
}

function nextQuestion() {
    if (revealed >= totalTiles) return winGame();
    if (qNum >= gameQuestions.length) {
        const pool = [...Q[currentCat.id]];
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        gameQuestions = gameQuestions.concat(pool);
    }
    currentQ = gameQuestions[qNum];
    qNum++;
    document.getElementById('qLabel').textContent = `${revealed + 1} / ${totalTiles} 格`;
    document.getElementById('qText').textContent = currentQ.q;

    const optsDiv = document.getElementById('qOpts');
    optsDiv.innerHTML = '';
    currentQ.o.forEach((text, idx) => {
        const btn = document.createElement('button');
        btn.className = 'q-opt';
        btn.textContent = text;
        btn.onclick = () => checkAnswer(idx, btn);
        optsDiv.appendChild(btn);
    });
}

function checkAnswer(idx, btn) {
    const allBtns = document.querySelectorAll('.q-opt');
    allBtns.forEach(b => b.disabled = true);

    if (idx === currentQ.a) {
        btn.classList.add('correct');
        score += 10 + streak * 5;
        streak++;
        document.getElementById('scoreNum').textContent = score;
        document.getElementById('streakText').textContent = streak > 1 ? `${streak}连对` : '';
        revealTile(); revealed++;
        document.getElementById('progFill').style.width = `${(revealed / totalTiles) * 100}%`;
        setTimeout(nextQuestion, 450);
    } else {
        btn.classList.add('wrong');
        streak = 0;
        document.getElementById('streakText').textContent = '';
        allBtns.forEach((b, i) => { if (i === currentQ.a) b.classList.add('correct'); });
        if (revealed > 0 && Math.random() < 0.4) {
            coverTile(); revealed--;
            document.getElementById('progFill').style.width = `${(revealed / totalTiles) * 100}%`;
        }
        const unrevealed = tiles.filter(t => !t.classList.contains('revealed'));
        if (unrevealed.length) {
            const rt = unrevealed[Math.floor(Math.random() * unrevealed.length)];
            rt.classList.add('wrong');
            setTimeout(() => rt.classList.remove('wrong'), 500);
        }
        setTimeout(nextQuestion, 1100);
    }
}

function revealTile() {
    const u = [];
    tiles.forEach((t, i) => { if (!t.classList.contains('revealed')) u.push(i); });
    if (!u.length) return;
    tiles[u[Math.floor(Math.random() * u.length)]].classList.add('revealed');
}

function coverTile() {
    const r = [];
    tiles.forEach((t, i) => { if (t.classList.contains('revealed')) r.push(i); });
    if (!r.length) return;
    tiles[r[Math.floor(Math.random() * r.length)]].classList.remove('revealed');
}

function winGame() {
    const elapsed = Math.round((Date.now() - startTime) / 1000);
    const mins = Math.floor(elapsed / 60);
    const secs = elapsed % 60;
    showScreen('winScreen');
    document.getElementById('winImg').innerHTML =
        `<div class="img-layer"><img src="${currentImg}" alt="" style="width:100%;height:100%;object-fit:cover"></div>`;
    const names = {drive:'驾照',civil:'考公',ielts:'雅思'};
    document.getElementById('winTitle').textContent = `${names[currentCat.id]} · 上岸成功`;
    document.getElementById('winStats').innerHTML =
        `得分 <strong style="color:var(--accent)">${score}</strong> · ` +
        `用时 ${mins > 0 ? mins + '分' : ''}${secs}秒 · 共 ${qNum} 题`;
}
</script>
