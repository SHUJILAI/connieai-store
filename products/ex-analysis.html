<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 前任分析报告 | Ex-Partner Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #F5F0E8;
            color: #2E2A24;
            padding: 20px;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 24px 0;
        }

        .header h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 28px;
            margin-bottom: 8px;
            color: #2E2A24;
        }

        .header p {
            font-size: 14px;
            color: #7B8F6B;
            font-weight: 300;
        }

        .card {
            background: #FFFDF8;
            border: 2px solid #EBE7E0;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(46, 42, 36, 0.04);
        }

        .section-title {
            font-family: 'Instrument Serif', serif;
            font-size: 20px;
            margin-bottom: 16px;
            color: #2E2A24;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #2E2A24;
        }

        .text-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #EBE7E0;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            background: #FFFDF8;
            color: #2E2A24;
            transition: border-color 0.2s;
        }

        .text-input:focus {
            outline: none;
            border-color: #7B8F6B;
        }

        .trait-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }

        .trait-item {
            position: relative;
        }

        .trait-checkbox {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .trait-label {
            display: block;
            padding: 12px 16px;
            border: 2px solid #EBE7E0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            background: #FFFDF8;
        }

        .trait-checkbox:checked + .trait-label {
            background: #7B8F6B;
            color: #FFFDF8;
            border-color: #7B8F6B;
        }

        .trait-label:hover {
            border-color: #7B8F6B;
        }

        .textarea-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #EBE7E0;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            background: #FFFDF8;
            color: #2E2A24;
            min-height: 80px;
            resize: vertical;
            transition: border-color 0.2s;
        }

        .textarea-input:focus {
            outline: none;
            border-color: #7B8F6B;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #7B8F6B;
            color: #FFFDF8;
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(123, 143, 107, 0.2);
        }

        .btn-primary:hover {
            background: #6a7d5e;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(123, 143, 107, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            padding: 12px 24px;
            background: #FFFDF8;
            color: #7B8F6B;
            border: 2px solid #7B8F6B;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin: 8px;
        }

        .btn-secondary:hover {
            background: #7B8F6B;
            color: #FFFDF8;
        }

        .report-container {
            display: none;
        }

        .report-container.active {
            display: block;
        }

        .report-header {
            text-align: center;
            border-bottom: 3px solid #2E2A24;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        .report-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #7B8F6B;
            letter-spacing: 2px;
        }

        .report-title {
            font-family: 'Instrument Serif', serif;
            font-size: 32px;
            margin: 8px 0;
            color: #2E2A24;
        }

        .report-subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #7B8F6B;
            letter-spacing: 1px;
        }

        .report-section {
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px dashed #EBE7E0;
        }

        .report-section:last-child {
            border-bottom: none;
        }

        .report-section-title {
            font-family: 'Instrument Serif', serif;
            font-size: 18px;
            margin-bottom: 16px;
            color: #2E2A24;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: #7B8F6B;
        }

        .diagnosis-grid {
            display: grid;
            gap: 12px;
        }

        .diagnosis-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #F5F0E8;
            border-radius: 8px;
        }

        .diagnosis-label {
            font-size: 14px;
            font-weight: 500;
            color: #2E2A24;
        }

        .diagnosis-value {
            font-family: 'Instrument Serif', serif;
            font-size: 16px;
            font-weight: 600;
            color: #7B8F6B;
        }

        .danger-rating {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .skull {
            color: #D14D3D;
            font-size: 18px;
        }

        .progress-bar {
            width: 100%;
            height: 24px;
            background: #EBE7E0;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7B8F6B, #D14D3D);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            color: #FFFDF8;
            transition: width 0.8s ease-out;
        }

        .symptom-list {
            list-style: none;
        }

        .symptom-item {
            padding: 10px 0;
            border-bottom: 1px solid #EBE7E0;
            font-size: 14px;
        }

        .symptom-item:last-child {
            border-bottom: none;
        }

        .symptom-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            background: #7B8F6B;
            color: #FFFDF8;
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 8px;
        }

        .symptom-tag.danger {
            background: #D14D3D;
        }

        .narrative {
            font-size: 15px;
            line-height: 1.8;
            color: #2E2A24;
            text-align: justify;
            padding: 16px;
            background: #F5F0E8;
            border-radius: 8px;
            border-left: 4px solid #7B8F6B;
        }

        .advice-list {
            list-style: none;
            counter-reset: advice-counter;
        }

        .advice-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            background: #F5F0E8;
            border-radius: 8px;
            counter-increment: advice-counter;
            position: relative;
            padding-left: 48px;
            font-size: 14px;
        }

        .advice-item::before {
            content: counter(advice-counter);
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Instrument Serif', serif;
            font-size: 20px;
            font-weight: 600;
            color: #7B8F6B;
        }

        .healing-time {
            text-align: center;
            padding: 16px;
            background: #7B8F6B;
            color: #FFFDF8;
            border-radius: 8px;
            margin-top: 16px;
        }

        .healing-time-label {
            font-size: 12px;
            margin-bottom: 4px;
            opacity: 0.9;
        }

        .healing-time-value {
            font-family: 'Instrument Serif', serif;
            font-size: 24px;
            font-weight: 600;
        }

        .warm-reminder {
            text-align: center;
            padding: 16px;
            background: #FFFDF8;
            border: 2px dashed #7B8F6B;
            border-radius: 8px;
            font-size: 14px;
            color: #7B8F6B;
            font-style: italic;
        }

        .report-footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 3px solid #2E2A24;
            text-align: center;
        }

        .stamp {
            display: inline-block;
            border: 3px solid #D14D3D;
            color: #D14D3D;
            padding: 12px 24px;
            border-radius: 50%;
            font-family: 'Instrument Serif', serif;
            font-size: 14px;
            font-weight: 600;
            transform: rotate(-15deg);
            margin: 16px 0;
        }

        .report-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #7B8F6B;
            margin-top: 8px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .watermark {
            text-align: center;
            font-size: 11px;
            color: #7B8F6B;
            margin-top: 32px;
            opacity: 0.6;
            font-family: 'JetBrains Mono', monospace;
        }

        .footer-link {
            text-align: center;
            margin-top: 16px;
            padding: 16px;
        }

        .footer-link a {
            color: #7B8F6B;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .footer-link a:hover {
            border-bottom-color: #7B8F6B;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .card {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .report-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 前任分析报告</h1>
            <p>科学鉴定 · 专业分析 · 快速治愈</p>
        </div>

        <div id="inputForm">
            <div class="card">
                <div class="input-group">
                    <label class="input-label">前任的昵称（选填）</label>
                    <input type="text" id="exName" class="text-input" placeholder="默认显示"前任"">
                </div>

                <div class="input-group">
                    <label class="input-label">选择你前任的特征（可多选）</label>
                    <div class="trait-grid">
                        <div class="trait-item">
                            <input type="checkbox" id="trait1" class="trait-checkbox" value="已读不回">
                            <label for="trait1" class="trait-label">已读不回</label>
                        </div>
                        <div class="trait-item">
                            <input type="checkbox" id="trait2" class="trait-checkbox" value="爱说随便">
                            <label for="trait2" class="trait-label">爱说"随便"</label>
                        </div>
                        <div class="trait-item">
                            <input type="checkbox" id="trait3" class="trait-checkbox" value="手机不让看">
                            <label for="trait3" class="trait-label">手机不让看</label>
                        </div>
                        <div class="trait-item">
                            <input type="checkbox" id="trait4" class="trait-checkbox" value="总说忙">
                            <label for="trait4" class="trait-label">总说忙</label>
                        </div>
                        <div class="trait-item">
                            <input type="checkbox" id="trait5" class="trait-checkbox" value="前任很多">
                            <label for="trait5" class="trait-label">前任很多</label>
                        </div>
                        <div class="trait-item">
                            <input type="checkbox" id="trait6" class="trait-checkbox" value="朋友圈屏蔽你">
                            <label for="trait6" class="trait-label">朋友圈屏蔽你</label>
                        </div>
                        <div class="trait-item">
                            <input type="checkbox" id="trait7" class="trait-checkbox" value="从不主动">
                            <label for="trait7" class="trait-label">从不主动</label>
                        </div>
                        <div class="trait-item">
                            <input type="checkbox" id="trait8" class="trait-checkbox" value="爱跟异性聊天">
                            <label for="trait8" class="trait-label">爱跟异性聊天</label>
                        </div>
                        <div class="trait-item">
                            <input type="checkbox" id="trait9" class="trait-checkbox" value="忘记纪念日">
                            <label for="trait9" class="trait-label">忘记纪念日</label>
                        </div>
                        <div class="trait-item">
                            <input type="checkbox" id="trait10" class="trait-checkbox" value="经常放鸽子">
                            <label for="trait10" class="trait-label">经常放鸽子</label>
                        </div>
                        <div class="trait-item">
                            <input type="checkbox" id="trait11" class="trait-checkbox" value="嘴上说爱你">
                            <label for="trait11" class="trait-label">嘴上说爱你</label>
                        </div>
                        <div class="trait-item">
                            <input type="checkbox" id="trait12" class="trait-checkbox" value="吵架冷暴力">
                            <label for="trait12" class="trait-label">吵架冷暴力</label>
                        </div>
                        <div class="trait-item">
                            <input type="checkbox" id="trait13" class="trait-checkbox" value="经济AA到极致">
                            <label for="trait13" class="trait-label">经济AA到极致</label>
                        </div>
                        <div class="trait-item">
                            <input type="checkbox" id="trait14" class="trait-checkbox" value="控制欲强">
                            <label for="trait14" class="trait-label">控制欲强</label>
                        </div>
                        <div class="trait-item">
                            <input type="checkbox" id="trait15" class="trait-checkbox" value="生气不说原因">
                            <label for="trait15" class="trait-label">生气不说原因</label>
                        </div>
                        <div class="trait-item">
                            <input type="checkbox" id="trait16" class="trait-checkbox" value="只在需要你时找你">
                            <label for="trait16" class="trait-label">只在需要你时找你</label>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">还有什么想补充的？</label>
                    <textarea id="extraNotes" class="textarea-input" placeholder="说说你前任的其他问题..."></textarea>
                </div>

                <button class="btn-primary" onclick="generateReport()">生成分析报告</button>
            </div>
        </div>

        <div id="reportContainer" class="report-container"></div>

        <div class="watermark">shujilai.github.io/connieai-store</div>

        <div class="footer-link">
            <a href="https://happycapy.ai/?via=connie" target="_blank">Powered by AI · Visit HappyCapy.ai</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://text.pollinations.ai/openai';

        const SYSTEM_PROMPT = `你是一个毒舌但专业的"前任鉴定师"，用户会提供前任的特征和补充信息，你要生成一份搞笑又有洞察力的分析报告。

要求：
- 语气：像一个看透人性的老中医写病历，专业术语+毒舌吐槽混搭
- 每个分析要针对具体特征，不能泛泛而谈
- 搞笑但有道理，让人笑着笑着觉得"确实是这样"

严格按以下JSON格式回复，不要输出任何其他内容：
{
  "typeName": "给前任起一个搞笑的分类名称（如：薛定谔型恋人、中央空调Plus、工具人收割机等）",
  "dangerLevel": 1到5的整数,
  "zhaValue": 1到99的整数,
  "symptoms": [
    {"trait": "特征名", "analysis": "一句话毒舌分析，要针对这个特征", "isDangerous": true或false}
  ],
  "narrative": "2-3句话的综合诊断，用医学报告的口吻写，但内容要搞笑犀利",
  "advice": ["医嘱1", "医嘱2", "医嘱3"],
  "healingTime": "预计治愈时间（如：3-6个月）",
  "reminder": "一句暖心但不油腻的话，带一个emoji"
}`;

        function getSelectedTraits() {
            return Array.from(document.querySelectorAll('.trait-checkbox:checked')).map(cb => cb.value);
        }

        async function generateReport() {
            const exName = document.getElementById('exName').value.trim() || '前任';
            const traits = getSelectedTraits();
            const extra = document.getElementById('extraNotes').value.trim();

            if (traits.length === 0) {
                alert('请至少选择一个前任的特征！');
                return;
            }

            const btn = document.querySelector('.btn-primary');
            btn.disabled = true;
            btn.textContent = '正在鉴定中...';

            const userMsg = `前任昵称：${exName}\n特征：${traits.join('、')}${extra ? '\n补充：' + extra : ''}`;

            try {
                const r = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'openai',
                        messages: [
                            { role: 'system', content: SYSTEM_PROMPT },
                            { role: 'user', content: userMsg }
                        ],
                        max_tokens: 1200,
                        temperature: 0.95
                    })
                });
                const raw = await r.json();
                if (!r.ok) throw new Error(raw.error?.message || '服务器开小差了');
                const content = raw.choices?.[0]?.message?.content;
                if (!content) throw new Error('AI 没有返回内容');
                const m = content.match(/\{[\s\S]*\}/);
                if (!m) throw new Error('AI 返回格式不正确');
                renderReport(exName, JSON.parse(m[0]));
            } catch (e) {
                alert('分析失败：' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '生成分析报告';
            }
        }

        function renderReport(exName, d) {
            const reportNumber = Math.floor(Math.random() * 90000) + 10000;
            const today = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
            const dangerFlags = '🚩'.repeat(Math.min(d.dangerLevel || 3, 5));
            const zha = Math.min(Math.max(d.zhaValue || 50, 1), 99);

            const reportHTML = `
                <div class="card">
                    <div class="report-header">
                        <div class="report-number">REPORT NO. ${reportNumber}</div>
                        <h1 class="report-title">前任分析报告</h1>
                        <div class="report-subtitle">EX-PARTNER ANALYSIS REPORT</div>
                    </div>

                    <div class="report-section">
                        <h2 class="report-section-title"><span class="section-number">01</span> 基本诊断</h2>
                        <div class="diagnosis-grid">
                            <div class="diagnosis-item">
                                <span class="diagnosis-label">对象昵称</span>
                                <span class="diagnosis-value">${exName}</span>
                            </div>
                            <div class="diagnosis-item">
                                <span class="diagnosis-label">前任类型</span>
                                <span class="diagnosis-value">${d.typeName}</span>
                            </div>
                            <div class="diagnosis-item">
                                <span class="diagnosis-label">危险等级</span>
                                <div class="danger-rating">${dangerFlags}</div>
                            </div>
                        </div>
                        <div style="margin-top:12px">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                                <span class="diagnosis-label">综合渣值</span>
                                <span style="font-family:'JetBrains Mono',monospace;font-size:14px;color:#D14D3D;font-weight:600">${zha}%</span>
                            </div>
                            <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0">${zha}%</div></div>
                        </div>
                    </div>

                    <div class="report-section">
                        <h2 class="report-section-title"><span class="section-number">02</span> 症状分析</h2>
                        <ul class="symptom-list">
                            ${(d.symptoms || []).map(s => `
                                <li class="symptom-item">
                                    <span class="symptom-tag ${s.isDangerous ? 'danger' : ''}">${s.trait}</span>
                                    ${s.analysis}
                                </li>
                            `).join('')}
                        </ul>
                    </div>

                    <div class="report-section">
                        <h2 class="report-section-title"><span class="section-number">03</span> 综合诊断</h2>
                        <div class="narrative">${d.narrative}</div>
                    </div>

                    <div class="report-section">
                        <h2 class="report-section-title"><span class="section-number">04</span> 医嘱</h2>
                        <ul class="advice-list">
                            ${(d.advice || []).map(a => `<li class="advice-item">${a}</li>`).join('')}
                        </ul>
                        <div class="healing-time">
                            <div class="healing-time-label">预计治愈时间</div>
                            <div class="healing-time-value">${d.healingTime || '1-3个月'}</div>
                        </div>
                    </div>

                    <div class="report-section">
                        <h2 class="report-section-title"><span class="section-number">05</span> 温馨提示</h2>
                        <div class="warm-reminder">${d.reminder || '你值得更好的 ❤️'}</div>
                    </div>

                    <div class="report-footer">
                        <div class="stamp">AI-Connie<br>鉴定中心</div>
                        <div class="report-date">报告日期: ${today}</div>
                    </div>

                    <div class="button-group">
                        <button class="btn-secondary" onclick="resetForm()">重新分析</button>
                        <button class="btn-secondary" onclick="analyzeAnother()">分析下一任</button>
                    </div>
                </div>
            `;

            document.getElementById('reportContainer').innerHTML = reportHTML;
            document.getElementById('reportContainer').classList.add('active');
            document.getElementById('inputForm').classList.add('hidden');
            document.getElementById('reportContainer').scrollIntoView({ behavior: 'smooth' });
            setTimeout(() => { const f = document.getElementById('pFill'); if (f) f.style.width = zha + '%'; }, 100);
        }

        function resetForm() {
            document.getElementById('reportContainer').classList.remove('active');
            document.getElementById('inputForm').classList.remove('hidden');
            document.querySelector('.container').scrollIntoView({ behavior: 'smooth' });
        }

        function analyzeAnother() {
            document.getElementById('exName').value = '';
            document.getElementById('extraNotes').value = '';
            document.querySelectorAll('.trait-checkbox').forEach(cb => cb.checked = false);
            resetForm();
        }
    </script>
</body>
</html>
