    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #F5F0E8;
            color: #2E2A24;
            padding: 20px;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 24px 0;
        }

        .header h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 28px;
            margin-bottom: 8px;
            color: #2E2A24;
        }

        .header p {
            font-size: 14px;
            color: #7B8F6B;
            font-weight: 300;
        }

        .card {
            background: #FFFDF8;
            border: 2px solid #EBE7E0;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(46, 42, 36, 0.04);
        }

        .section-title {
            font-family: 'Instrument Serif', serif;
            font-size: 20px;
            margin-bottom: 16px;
            color: #2E2A24;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #2E2A24;
        }

        .text-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #EBE7E0;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            background: #FFFDF8;
            color: #2E2A24;
            transition: border-color 0.2s;
        }

        .text-input:focus {
            outline: none;
            border-color: #7B8F6B;
        }

        .trait-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }

        .trait-item {
            position: relative;
        }

        .trait-checkbox {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .trait-label {
            display: block;
            padding: 12px 16px;
            border: 2px solid #EBE7E0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            background: #FFFDF8;
        }

        .trait-checkbox:checked + .trait-label {
            background: #7B8F6B;
            color: #FFFDF8;
            border-color: #7B8F6B;
        }

        .trait-label:hover {
            border-color: #7B8F6B;
        }

        .textarea-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #EBE7E0;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            background: #FFFDF8;
            color: #2E2A24;
            min-height: 80px;
            resize: vertical;
            transition: border-color 0.2s;
        }

        .textarea-input:focus {
            outline: none;
            border-color: #7B8F6B;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #7B8F6B;
            color: #FFFDF8;
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(123, 143, 107, 0.2);
        }

        .btn-primary:hover {
            background: #6a7d5e;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(123, 143, 107, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            padding: 12px 24px;
            background: #FFFDF8;
            color: #7B8F6B;
            border: 2px solid #7B8F6B;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin: 8px;
        }

        .btn-secondary:hover {
            background: #7B8F6B;
            color: #FFFDF8;
        }

        .report-container {
            display: none;
        }

        .report-container.active {
            display: block;
        }

        .report-header {
            text-align: center;
            border-bottom: 3px solid #2E2A24;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        .report-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #7B8F6B;
            letter-spacing: 2px;
        }

        .report-title {

            font-size: 32px;
            margin: 8px 0;
            color: #2E2A24;
        }

        .report-subtitle {

            font-size: 11px;
            color: #7B8F6B;
            letter-spacing: 1px;

        .report-section {

            padding-bottom: 24px;
            border-bottom: 1px dashed #EBE7E0;
        }

            border-bottom: none;
        }

        .report-section-title {
            font-family: 'Instrument Serif', serif;
            font-size: 18px;
            margin-bottom: 16px;
            color: #2E2A24;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: #7B8F6B;
        }

        .diagnosis-grid {
            display: grid;
            gap: 12px;

        .diagnosis-item {

            align-items: center;
            padding: 12px;
            background: #F5F0E8;
            border-radius: 8px;

        .diagnosis-label {
            font-size: 14px;
            font-weight: 500;
            color: #2E2A24;
        }

        .diagnosis-value {

            font-size: 16px;
            font-weight: 600;
            color: #7B8F6B;
        }

        .danger-rating {

            gap: 4px;
            align-items: center;
        }

        .skull {
            color: #D14D3D;
            font-size: 18px;
        }

        .progress-bar {
            width: 100%;
            height: 24px;
            background: #EBE7E0;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7B8F6B, #D14D3D);

            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            color: #FFFDF8;
            transition: width 0.8s ease-out;
        }

        .symptom-list {
            list-style: none;
        }

        .symptom-item {
            padding: 10px 0;
            border-bottom: 1px solid #EBE7E0;
            font-size: 14px;
        }

        .symptom-item:last-child {
            border-bottom: none;
        }

        .symptom-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            background: #7B8F6B;
            color: #FFFDF8;
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 8px;
        }

        .symptom-tag.danger {
            background: #D14D3D;
        }

        .narrative {
            font-size: 15px;
            line-height: 1.8;
            color: #2E2A24;
            text-align: justify;
            padding: 16px;
            background: #F5F0E8;
            border-radius: 8px;
            border-left: 4px solid #7B8F6B;
        }

        .advice-list {
            list-style: none;
            counter-reset: advice-counter;
        }

        .advice-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            background: #F5F0E8;
            border-radius: 8px;
            counter-increment: advice-counter;
            position: relative;
            padding-left: 48px;
            font-size: 14px;
        }

        .advice-item::before {
            content: counter(advice-counter);
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Instrument Serif', serif;
            font-size: 20px;
            font-weight: 600;
            color: #7B8F6B;
        }

        .healing-time {
            text-align: center;
            padding: 16px;
            background: #7B8F6B;
            color: #FFFDF8;
            border-radius: 8px;
            margin-top: 16px;
        }

        .healing-time-label {
            font-size: 12px;
            margin-bottom: 4px;
            opacity: 0.9;
        }

        .healing-time-value {
            font-family: 'Instrument Serif', serif;
            font-size: 24px;
            font-weight: 600;
        }

        .warm-reminder {

            padding: 16px;
            background: #FFFDF8;
            border: 2px dashed #7B8F6B;
            border-radius: 8px;
            font-size: 14px;
            color: #7B8F6B;
            font-style: italic;
        }

        .report-footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 3px solid #2E2A24;
            text-align: center;
        }

        .stamp {
            display: inline-block;
            border: 3px solid #D14D3D;
            color: #D14D3D;
            padding: 12px 24px;
            border-radius: 50%;
            font-family: 'Instrument Serif', serif;
            font-size: 14px;
            font-weight: 600;

        .report-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #7B8F6B;
            margin-top: 8px;
        }

        .button-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .watermark {
            text-align: center;
            font-size: 11px;
            color: #7B8F6B;
            margin-top: 32px;
            opacity: 0.6;
            font-family: 'JetBrains Mono', monospace;
        }

        .footer-link {
            text-align: center;
            margin-top: 16px;
            padding: 16px;
        }

        .footer-link a {
            color: #7B8F6B;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .footer-link a:hover {
            border-bottom-color: #7B8F6B;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;

            }

            .report-title {

            }
        }
    </style>
</head>

        function getSelectedTraits() {
            const checkboxes = document.querySelectorAll('.trait-checkbox:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        function determineExType(traits) {
            if (traits.length === 0) {
                return { name: '迷惑型恋人', keywords: ['未知', '神秘', '不确定'] };
            }

            let bestMatch = exTypes[0];
            let maxScore = 0;

            exTypes.forEach(type => {
                let score = 0;
                type.traits.forEach(trait => {
                    if (traits.some(t => trait.includes(t) || t.includes(trait))) {
                        score++;
                    }
                });
                if (score > maxScore) {
                    maxScore = score;
                    bestMatch = type;
                }
            });

            return bestMatch;
        }

        function calculateDangerLevel(traits) {
            const dangerousTraits = ['手机不让看', '前任很多', '爱跟异性聊天', '吵架冷暴力', '控制欲强', '只在需要你时找你'];
            let dangerCount = 0;
            traits.forEach(trait => {
                if (dangerousTraits.includes(trait)) dangerCount++;
            });

            if (traits.length >= 10) return 5;
            if (traits.length >= 8) return 4;
            if (dangerCount >= 3) return 4;
            if (traits.length >= 5) return 3;
            if (dangerCount >= 2) return 3;
            if (traits.length >= 3) return 2;
            return Math.max(1, Math.min(dangerCount + 1, 5));
        }

        function calculateZhaValue(traits) {
            const baseValue = Math.min(traits.length * 6, 70);
            const randomBonus = Math.floor(Math.random() * 25);
            return Math.min(baseValue + randomBonus, 99);
        }

        function generateSymptomAnalysis(traits) {
            return traits.map(trait => {
                const analyses = symptomAnalysis[trait] || ['该症状需要进一步观察分析'];
                const analysis = analyses[Math.floor(Math.random() * analyses.length)];
                const isDangerous = ['手机不让看', '控制欲强', '吵架冷暴力', '爱跟异性聊天'].includes(trait);
                return { trait, analysis, isDangerous };
            });
        }

            }

            const template = narrativeTemplates[Math.floor(Math.random() * narrativeTemplates.length)];
            const traitsList = traits.slice(0, 3).join('、');
            const patterns = ['自私中心', '情感缺失', '逃避责任', '不成熟', '不尊重'];
            const behaviors = [

                '你终于意识到自己值得更好的',
                '你不再愿意委屈自己',
                '这段不平等关系的终结'
            ];
            const coreIssues = ['自私', '不负责任', '情感冷漠', '缺乏边界感', '不会爱人'];
            const feelings = ['委屈', '疲惫', '不被重视', '患得患失', '自我怀疑'];
            const yourStates = ['付出了全部', '小心翼翼', '一再降低底线', '努力维系', '不断迁就'];
            const tendencies = ['造成对方痛苦', '无法维持长期关系', '伤害深爱他的人', '只会索取不会付出'];

            let narrative = template
                .replace('{traits}', traitsList)
                .replace('{pattern}', patterns[Math.floor(Math.random() * patterns.length)])
                .replace('{behavior}', behaviors[Math.floor(Math.random() * behaviors.length)])
                .replace('{conclusion}', conclusions[Math.floor(Math.random() * conclusions.length)])
                .replace('{core_issue}', coreIssues[Math.floor(Math.random() * coreIssues.length)])
                .replace('{feeling}', feelings[Math.floor(Math.random() * feelings.length)])
                .replace('{your_state}', yourStates[Math.floor(Math.random() * yourStates.length)])
                .replace('{tendency}', tendencies[Math.floor(Math.random() * tendencies.length)]);

            return narrative;
        }

            const shuffled = [...advicePool].sort(() => 0.5 - Math.random());
